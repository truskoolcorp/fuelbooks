function calcTaxes(fuelType, gallons, state, deliveryType) {
  const fedRate = FEDERAL_FUEL_TAX[fuelType] || 0;
  const stateData = STATE_FUEL_TAX[state] || {};
  const stateRate = stateData[fuelType] || 0;
  const fedTax = fedRate * gallons;
  const stateTax = stateRate * gallons;
  const isExempt = deliveryType === "export" || deliveryType === "government" || (fuelType === "Jet-A" && deliveryType === "airline");
  return { federalRate: fedRate, stateRate, fedTax: isExempt ? 0 : fedTax, stateTax: isExempt ? 0 : stateTax, totalTax: isExempt ? 0 : fedTax + stateTax, combinedRate: isExempt ? 0 : fedRate + stateRate, exempt: isExempt, exemptReason: isExempt ? deliveryType + " exempt" : null };
}

function App() {
  const [tab, setTab] = useState("dashboard");
  const [loads, setLoads] = useState(initLoads);
  const [invoices, setInvoices] = useState([]);
  const [payments, setPayments] = useState([]);
  const [expenses, setExpenses] = useState(initExpenses);
  const [customers, setCustomers] = useState(initCustomers);
  const [suppliers] = useState(initSuppliers);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  // Auto-gen invoices on mount
  useEffect(() => {
    const inv = [];
    loads.filter(l => l.status === "delivered").forEach(l => {
      const cust = customers.find(c => c.id === l.customerId);
      const taxes = calcTaxes(l.fuelType, l.gallons, l.deliveryState, l.deliveryType);
      const fuelTotal = l.gallons * l.sellPrice;
      const li = [{ desc: l.fuelType + " — " + fmtN(l.gallons) + " gal @ " + fmt4(l.sellPrice) + "/gal", amount: fuelTotal, type: "fuel" }];
      if (taxes.totalTax > 0) {
        li.push({ desc: "Federal Excise Tax (" + fmt4(taxes.federalRate) + "/gal × " + fmtN(l.gallons) + ")", amount: taxes.fedTax, type: "fedtax" });
        li.push({ desc: (STATE_FUEL_TAX[l.deliveryState]?.name || l.deliveryState) + " State Tax (" + fmt4(taxes.stateRate) + "/gal × " + fmtN(l.gallons) + ")", amount: taxes.stateTax, type: "statetax" });
      }
      if (taxes.exempt) li.push({ desc: "Tax Exempt: " + taxes.exemptReason, amount: 0, type: "exempt" });
      const total = fuelTotal + taxes.totalTax;
      inv.push({ id: "INV-" + (3001 + inv.length), loadId: l.id, customerId: l.customerId, customerName: cust?.name || "Unknown", date: l.date, dueDate: addDays(l.date, cust?.terms || 10), terms: cust?.terms || 10, lineItems: li, subtotal: fuelTotal, fedTax: taxes.fedTax, stateTax: taxes.stateTax, totalTax: taxes.totalTax, total, paid: 0, status: "outstanding", deliveryState: l.deliveryState, fuelType: l.fuelType, gallons: l.gallons, taxExempt: taxes.exempt, exemptReason: taxes.exemptReason });
    });
    if (inv[1]) { inv[1].paid = inv[1].total; inv[1].status = "paid"; }
    if (inv[2]) { inv[2].paid = inv[2].total; inv[2].status = "paid"; }
    if (inv[4]) { inv[4].paid = inv[4].total; inv[4].status = "paid"; }
    if (inv[5]) { inv[5].paid = inv[5].total; inv[5].status = "paid"; }
    if (inv[7]) { inv[7].dueDate = "2026-02-15"; inv[7].status = "overdue"; }
    setInvoices(inv);
    setPayments(inv.filter(i => i.status === "paid").map((i, x) => ({ id: "PMT-" + (7000 + x), invoiceId: i.id, customerId: i.customerId, customerName: i.customerName, date: addDays(i.date, 3 + x), amount: i.total, method: ["ACH", "Wire", "Check"][x % 3], reference: "REF-" + (90000 + x) })));
  }, []);

  const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };

  const recordPayment = (invoiceId, amount, method, reference) => {
    setInvoices(prev => prev.map(inv => inv.id !== invoiceId ? inv : { ...inv, paid: inv.paid + amount, status: inv.paid + amount >= inv.total ? "paid" : "partial" }));
    const inv = invoices.find(i => i.id === invoiceId);
    setPayments(prev => [...prev, { id: genId("PMT"), invoiceId, amount, method, reference, date: today(), customerId: inv?.customerId, customerName: inv?.customerName }]);
    showToast("Payment of " + fmt(amount) + " recorded against " + invoiceId);
  };

  const createInvoice = (inv) => { setInvoices(prev => [...prev, inv]); setModal(null); showToast("Invoice " + inv.id + " created for " + fmt(inv.total)); };

  // P&L auto-calc
  const pnl = useMemo(() => {
    const del = loads.filter(l => l.status === "delivered");
